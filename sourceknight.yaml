project:
  sourceknight: 0.3
  name: ZLeader

  dependencies:
    - name: sourcemod
      type: tar
      version: 1.12
      location: https://sm.alliedmods.net/smdrop/1.12/sourcemod-1.12.0-git7223-linux.tar.gz
      unpack:
        - source: /addons
          dest: /addons

    - name: multicolors
      type: git
      repo: https://github.com/srcdslab/sm-plugin-MultiColors
      unpack:
        - source: /addons/sourcemod/scripting/include
          dest: /addons/sourcemod/scripting/include

    - name: zombiereloaded
      type: git
      repo: https://github.com/srcdslab/sm-plugin-zombiereloaded
      unpack:
        - source: /src/addons/sourcemod/scripting/include
          dest: /addons/sourcemod/scripting/include

    - name: vip_core
      type: git
      repo: https://github.com/srcdslab/sm-plugin-VIP-Core
      unpack:
        - source: /addons/sourcemod/scripting/include
          dest: /addons/sourcemod/scripting/include

    - name: CustomChatColors
      type: git
      repo: https://github.com/srcdslab/sm-plugin-CustomChatColors
      unpack:
        - source: /addons/sourcemod/scripting/include
          dest: /addons/sourcemod/scripting/include

    - name: utilshelper
      type: git
      repo: https://github.com/srcdslab/sm-plugin-utilshelper
      unpack:
        - source: /addons
          dest: /addons

    - name: sourcebans-pp
      type: git
      repo: https://github.com/sbpp/sourcebans-pp
      unpack:
        - source: /game/addons
          dest: /addons

  root: /
  output: /addons/sourcemod/plugins

  targets:
    - ZLeader
